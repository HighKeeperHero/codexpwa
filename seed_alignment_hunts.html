async function seed() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.textContent = '';

  function append(msg, cls = '') {
    const line = document.createElement('div');
    line.className = cls;
    line.textContent = msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  append(`Seeding ${HUNTS.length} alignment hunts…\n`);

  let ok = 0, fail = 0;
  for (const hunt of HUNTS) {
    try {
      const resp = await fetch(`${BASE}/api/quests/templates`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(hunt),
      });
      const json = await resp.json();
      if (!resp.ok) throw new Error(json?.message ?? JSON.stringify(json));
      append(`  ✔ [${hunt.quest_type}] ${hunt.name}`, 'ok');
      ok++;
    } catch (e) {
      append(`  ✘ [${hunt.quest_type}] ${hunt.name}: ${e.message}`, 'err');
      fail++;
    }
    await new Promise(r => setTimeout(r, 150)); // gentle rate
  }

  append(`\nDone — ${ok} seeded, ${fail} failed.`);
  if (fail === 0) append('All hunts live. Close this tab.', 'ok');
  btn.textContent = 'COMPLETE';
}
